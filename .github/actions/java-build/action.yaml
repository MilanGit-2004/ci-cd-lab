name: "Java Runner"
description: "Compile and run Java file"

inputs:
  file-name:
    description: "Java file name"
    required: true
runs:
  using: "composite"

  steps:
    - name: Compile java
      run: javac ${{inputs.file-name}}.java
      shell: bash

    - name: Run java Program
      run: java ${{inputs.file-name}}
      shell: bash
